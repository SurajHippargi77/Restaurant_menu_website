<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saffron Table | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Saffron Table</a>
    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">Menu</button>
    <nav class="site-nav" id="site-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="content-page">
    <section class="content-header">
      <p class="eyebrow">Get In Touch</p>
      <h1>We would love to hear from you.</h1>
    </section>

    <section class="form-wrap">
      <form id="contact-form" class="contact-form" novalidate>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="btn">Send Message</button>
        <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>2026 Saffron Table. Crafted for good food and great company.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
